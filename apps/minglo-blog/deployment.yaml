apiVersion: apps/v1
kind: Deployment
metadata:
  name: DEPLOYMENT_NAME
  namespace: NAMESPACE
  labels:
    app: PROJECT
spec:
  selector:
    matchLabels:
      project: PROJECT
  template:
    metadata:
      namespace: NAMESPACE
      labels:
        project: PROJECT
    spec:
      containers:
         - name: PROJECT
           image: REGISTRY_HOSTNAME/PROJECT:TAG_VERSION
           securityContext:
             allowPrivilegeEscalation: false
             runAsNonRoot: true      # опционально, но хорошая практика
             runAsUser: 1000         # опционально
           ports:
             - containerPort: PORT_CONTAINER
           env:
             - name: MINGLO_DB_URL
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MINGLO_DB_URL
             - name: MINGLO_TESTING_MODULE
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MINGLO_TESTING_MODULE
             - name: MINGLO_SWAGGER
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MINGLO_SWAGGER
             - name: MINGLO_TRUST_PROXY
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MINGLO_TRUST_PROXY
             - name: MINGLO_CORS
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MINGLO_CORS
             - name: MINGLO_CORS_ORIGINS
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MINGLO_CORS_ORIGINS
             - name: MINGLO_CORS_CREDENTIALS
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MINGLO_CORS_CREDENTIALS
             - name: MINGLO_COOKIE_PARSER
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MINGLO_COOKIE_PARSER
             - name: MAIL_SERVICE
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MAIL_SERVICE
             - name: MAIL_ADDRESS
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MAIL_ADDRESS
             - name: MAIL_PASS
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MAIL_PASS
             - name: MAIL_FROM
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MAIL_FROM
             - name: MINGLO_THROTTLE_TTL
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MINGLO_THROTTLE_TTL
             - name: MINGLO_THROTTLE_LIMIT
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MINGLO_THROTTLE_LIMIT
             - name: LOGGER_HOST
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: LOGGER_HOST
             - name: LOGGER_URL_PATH
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: LOGGER_URL_PATH
             - name: LOGGER_LEVEL
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: LOGGER_LEVEL
             - name: LOGGER_LICENSE_KEY
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: LOGGER_LICENSE_KEY
             - name: MINGLO_PORT
               valueFrom:
                 secretKeyRef:
                   name: minglo-core-backend-production-config-secret
                   key: MINGLO_PORT
