version: '3.9'

services:

  postgres-dev:
    image: postgres:16
    container_name: minglo-local-dev
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: minglo_dev
    ports:
      - "5432:5432"
    volumes:
      - minglo_dev_data:/var/lib/postgresql/data

  postgres-test:
    image: postgres:16
    container_name: minglo-local-test
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: minglo_test
    ports:
      - "5433:5432"
    volumes:
      - minglo_test_data:/var/lib/postgresql/data

volumes:
  minglo_dev_data:
  minglo_test_data: